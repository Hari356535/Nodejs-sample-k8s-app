{{- if .Values.fluentbit.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-fluent-bit-config
  labels:
    app: fluent-bit
    release: {{ .Release.Name }}
data:
  # ── Main Fluent Bit pipeline config ─────────────────────────────────────────
  fluent-bit.conf: |
    [SERVICE]
        Flush           1
        Log_Level       info
        Daemon          off
        Parsers_File    parsers.conf
        HTTP_Server     On
        HTTP_Listen     0.0.0.0
        HTTP_Port       2020

    # Tail all container log files on the node
    [INPUT]
        Name              tail
        Tag               kube.*
        Path              /var/log/containers/*.log
        Parser            docker
        DB                /var/log/flb_kube.db
        Mem_Buf_Limit     5MB
        Skip_Long_Lines   On
        Refresh_Interval  10

    # Enrich log records with Kubernetes metadata (namespace, pod, container…)
    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Kube_Tag_Prefix     kube.var.log.containers.
        Merge_Log           On
        Keep_Log            Off
        K8S-Logging.Parser  On
        K8S-Logging.Exclude On

    # Optional: drop noisy system logs from kube-system
    [FILTER]
        Name    grep
        Match   kube.*
        Exclude $kubernetes['namespace_name'] kube-system

    # Ship to Elasticsearch (deployed by the elasticsearch sub-chart)
    [OUTPUT]
        Name              es
        Match             kube.*
        Host              {{ .Release.Name }}-elasticsearch-master
        Port              9200
        Logstash_Format   On
        Logstash_Prefix   nodejs-logs
        Logstash_DateFormat %Y.%m.%d
        Type              _doc
        Replace_Dots      On
        Retry_Limit       5
        tls               Off
        tls.verify        Off

  # ── Parsers ──────────────────────────────────────────────────────────────────
  parsers.conf: |
    [PARSER]
        Name        docker
        Format      json
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%LZ
        Time_Keep   On

    [PARSER]
        Name        json
        Format      json
        Time_Key    timestamp
        Time_Format %Y-%m-%dT%H:%M:%S.%LZ
        Time_Keep   On
{{- end }}
