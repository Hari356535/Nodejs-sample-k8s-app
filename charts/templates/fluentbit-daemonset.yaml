{{- if .Values.fluentbit.enabled -}}
# ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-fluent-bit-sa
  labels:
    app: fluent-bit
    release: {{ .Release.Name }}
---
# ClusterRole: read pods & namespaces for metadata enrichment
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-fluent-bit-cr
  labels:
    app: fluent-bit
    release: {{ .Release.Name }}
rules:
  - apiGroups: [""]
    resources: ["namespaces", "pods", "pods/logs"]
    verbs: ["get", "list", "watch"]
---
# ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-fluent-bit-crb
  labels:
    app: fluent-bit
    release: {{ .Release.Name }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Name }}-fluent-bit-cr
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-fluent-bit-sa
    namespace: {{ .Release.Namespace }}
---
# DaemonSet: one Fluent Bit pod per EKS worker node
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ .Release.Name }}-fluent-bit
  labels:
    app: fluent-bit
    release: {{ .Release.Name }}
spec:
  selector:
    matchLabels:
      app: fluent-bit
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: fluent-bit
        release: {{ .Release.Name }}
      annotations:
        # Prometheus scrapes Fluent Bit's own internal metrics on port 2020
        prometheus.io/scrape: "true"
        prometheus.io/port:   "2020"
        prometheus.io/path:   "/api/v1/metrics/prometheus"
    spec:
      serviceAccountName: {{ .Release.Name }}-fluent-bit-sa
      tolerations:
        # Ensure Fluent Bit also runs on tainted nodes (e.g. dedicated node groups)
        - key: node-role.kubernetes.io/master
          effect: NoSchedule
      containers:
        - name: fluent-bit
          image: {{ .Values.fluentbit.image }}
          imagePullPolicy: Always
          ports:
            - name: http-metrics
              containerPort: 2020
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: http-metrics
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          volumeMounts:
            - name: varlog
              mountPath: /var/log
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
            - name: config
              mountPath: /fluent-bit/etc/
      volumes:
        - name: varlog
          hostPath:
            path: /var/log
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers
        - name: config
          configMap:
            name: {{ .Release.Name }}-fluent-bit-config
{{- end }}
